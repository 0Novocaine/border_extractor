<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный извлекатель фрагментов GeoJSON</title>
    <!-- Подключаем Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 600px; width: 100%; border-radius: 0.5rem; z-index: 1; }
        
        /* Стили для кастомных маркеров */
        .custom-marker {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .marker-start { background-color: #10b981; } /* Emerald */
        .marker-mid { background-color: #f59e0b; }   /* Amber */
        .marker-end { background-color: #ef4444; }   /* Red */
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        
        <div class="p-6 md:p-8 border-b border-slate-100 bg-slate-50">
            <h1 class="text-2xl font-bold text-slate-900 mb-2">Универсальный извлекатель фрагментов границ</h1>
            <p class="text-slate-500 mb-6 text-sm">
                Загрузите GeoJSON с линиями или полигонами. Затем выберите на карте начальную, конечную (и опционально промежуточную) точки. Алгоритм проложит маршрут строго по линиям вашего файла.
            </p>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                <!-- Загрузка файла -->
                <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">1. Загрузите файл (GeoJSON):</label>
                    <input type="file" id="fileInput" accept=".geojson,.json" class="block w-full text-sm text-slate-500
                        file:mr-4 file:py-2 file:px-4
                        file:rounded-md file:border-0
                        file:text-sm file:font-semibold
                        file:bg-blue-50 file:text-blue-700
                        hover:file:bg-blue-100 cursor-pointer transition-colors" />
                </div>

                <!-- Управление точками -->
                <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">2. Установите точки (клик по карте):</label>
                    <div class="flex flex-wrap gap-2">
                        <button id="btnSetStart" class="flex-1 py-1 px-2 text-sm rounded border-2 border-emerald-500 bg-emerald-100 text-emerald-800 font-medium transition-colors">🟢 Старт</button>
                        <button id="btnSetMid" class="flex-1 py-1 px-2 text-sm rounded border-2 border-transparent bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium transition-colors" title="Необязательно. Используйте, чтобы направить маршрут по нужному пути на развилке.">🟡 Промеж. (опц.)</button>
                        <button id="btnSetEnd" class="flex-1 py-1 px-2 text-sm rounded border-2 border-transparent bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium transition-colors">🔴 Финиш</button>
                    </div>
                </div>

                <!-- Действия -->
                <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm flex flex-col gap-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-0">3. Действия:</label>
                    <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-sm disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                        Извлечь маршрут
                    </button>
                    <button id="resetBtn" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-1 px-4 rounded-lg transition-all text-sm">
                        Сбросить точки
                    </button>
                </div>
            </div>
            
            <div id="statusMsg" class="mt-4 text-sm font-medium text-slate-600">Ожидание файла...</div>
        </div>

        <div class="relative">
            <div id="map"></div>
            
            <!-- Панель скачивания поверх карты -->
            <div id="downloadSection" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-[1000] hidden">
                <div class="bg-white p-4 rounded-xl shadow-lg border border-emerald-200 text-center flex flex-col items-center">
                    <span class="text-emerald-600 font-bold mb-2">✅ Маршрут успешно извлечен!</span>
                    <a id="downloadLink" href="#" download="extracted_segment.geojson" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-8 rounded-lg shadow-md transition-transform hover:scale-105">
                        Скачать GeoJSON
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация карты Leaflet
        const map = L.map('map').setView([49.0, 31.0], 5); // Центр Украины по умолчанию
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap',
            // Добавлено правило для обхода блокировок 403 от серверов OSM
            referrerPolicy: 'no-referrer-when-downgrade' 
        }).addTo(map);

        // Состояние приложения
        let graph = new Map();      // Граф смежности: "x,y" -> Set("x1,y1", "x2,y2")
        let coordsDict = new Map(); // "x,y" -> [x, y]
        let nodesArray = [];        // Массив всех узлов для быстрого поиска
        
        let baseGeojsonLayer = null;
        let resultGeojsonLayer = null;

        // Состояние точек
        let currentMode = 'start'; // 'start', 'mid', 'end'
        let points = {
            start: { nodeStr: null, marker: null },
            mid:   { nodeStr: null, marker: null },
            end:   { nodeStr: null, marker: null }
        };

        // Элементы UI
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusMsg = document.getElementById('statusMsg');
        const downloadSection = document.getElementById('downloadSection');
        const downloadLink = document.getElementById('downloadLink');

        const btnSetStart = document.getElementById('btnSetStart');
        const btnSetMid = document.getElementById('btnSetMid');
        const btnSetEnd = document.getElementById('btnSetEnd');

        // Иконки маркеров
        const createIcon = (type) => L.divIcon({
            className: `custom-marker marker-${type}`,
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        // Вспомогательные функции
        function ptToStr(pt) { return `${pt[0]},${pt[1]}`; }
        function distance(p1, p2) { return Math.hypot(p1[0] - p2[0], p1[1] - p2[1]); }
        function updateStatus(msg, isError = false) {
            statusMsg.textContent = msg;
            statusMsg.className = `mt-4 text-sm font-medium ${isError ? 'text-red-600' : 'text-slate-600'}`;
        }

        function setActiveMode(mode) {
            currentMode = mode;
            [btnSetStart, btnSetMid, btnSetEnd].forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-100', 'text-emerald-800');
                btn.classList.add('border-transparent', 'bg-slate-100', 'text-slate-700');
            });

            const activeBtn = mode === 'start' ? btnSetStart : (mode === 'mid' ? btnSetMid : btnSetEnd);
            activeBtn.classList.remove('border-transparent', 'bg-slate-100', 'text-slate-700');
            activeBtn.classList.add('border-emerald-500', 'bg-emerald-100', 'text-emerald-800');
            
            updateStatus(`Режим выбора: ${mode === 'start' ? 'Начальная' : (mode === 'mid' ? 'Промежуточная' : 'Конечная')} точка. Кликните по линии на карте.`);
        }

        btnSetStart.addEventListener('click', () => setActiveMode('start'));
        btnSetMid.addEventListener('click', () => setActiveMode('mid'));
        btnSetEnd.addEventListener('click', () => setActiveMode('end'));

        resetBtn.addEventListener('click', () => {
            Object.keys(points).forEach(key => {
                if (points[key].marker) map.removeLayer(points[key].marker);
                points[key].nodeStr = null;
                points[key].marker = null;
            });
            if (resultGeojsonLayer) {
                map.removeLayer(resultGeojsonLayer);
                resultGeojsonLayer = null;
            }
            downloadSection.classList.add('hidden');
            setActiveMode('start');
            updateStatus('Точки сброшены. Установите стартовую точку.');
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            updateStatus('Читаем файл...');
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    processGeoJSON(data);
                } catch (err) {
                    updateStatus(`Ошибка парсинга JSON: ${err.message}`, true);
                }
            };
            reader.readAsText(file);
        });

        function processGeoJSON(data) {
            updateStatus('Анализ геометрии и построение графа...');
            graph.clear();
            coordsDict.clear();
            nodesArray = [];

            const features = data.features || (data.type === 'Feature' ? [data] : []);
            let edgeCount = 0;

            for (const feature of features) {
                const geom = feature.geometry;
                if (!geom) continue;

                let coords = [];
                if (geom.type === 'Polygon') coords = geom.coordinates;
                else if (geom.type === 'MultiPolygon') {
                    for (const poly of geom.coordinates) coords.push(...poly);
                }
                else if (geom.type === 'LineString') coords = [geom.coordinates];
                else if (geom.type === 'MultiLineString') coords = geom.coordinates;

                for (const ring of coords) {
                    for (let j = 0; j < ring.length - 1; j++) {
                        const p1 = ring[j];
                        const p2 = ring[j+1];
                        const p1Str = ptToStr(p1);
                        const p2Str = ptToStr(p2);

                        if (p1Str === p2Str) continue;

                        coordsDict.set(p1Str, p1);
                        coordsDict.set(p2Str, p2);

                        if (!graph.has(p1Str)) graph.set(p1Str, new Set());
                        if (!graph.has(p2Str)) graph.set(p2Str, new Set());

                        graph.get(p1Str).add(p2Str);
                        graph.get(p2Str).add(p1Str); // Делаем граф неориентированным для свободы поиска
                        edgeCount++;
                    }
                }
            }

            nodesArray = Array.from(graph.keys());

            // Отрисовка базового слоя
            if (baseGeojsonLayer) map.removeLayer(baseGeojsonLayer);
            baseGeojsonLayer = L.geoJSON(data, {
                style: { color: '#3b82f6', weight: 2, opacity: 0.4 },
                interactive: false // Отключаем интерактивность слоя, клики ловит сама карта
            }).addTo(map);

            if (baseGeojsonLayer.getBounds().isValid()) {
                map.fitBounds(baseGeojsonLayer.getBounds());
            }

            updateStatus(`Файл загружен. Извлечено узлов: ${nodesArray.length}. Выберите стартовую точку на карте.`);
            resetBtn.click();
        }

        map.on('click', function(e) {
            if (nodesArray.length === 0) {
                updateStatus('Сначала загрузите GeoJSON файл!', true);
                return;
            }

            // Ищем ближайший узел к месту клика
            const clickLat = e.latlng.lat;
            const clickLng = e.latlng.lng;
            
            let minDist = Infinity;
            let nearestNodeStr = null;

            // Простой линейный поиск (работает достаточно быстро для десятков тысяч точек в JS)
            for (const nodeStr of nodesArray) {
                const pt = coordsDict.get(nodeStr);
                // Внимание: pt это [lng, lat] из GeoJSON
                const dist = distance([clickLng, clickLat], pt);
                if (dist < minDist) {
                    minDist = dist;
                    nearestNodeStr = nodeStr;
                }
            }

            if (nearestNodeStr) {
                placePoint(currentMode, nearestNodeStr);
                
                // Автоматическое переключение режима для удобства
                if (currentMode === 'start') setActiveMode('end');
                else if (currentMode === 'end' && !points.mid.nodeStr) {
                    updateStatus('Точки установлены. Нажмите "Извлечь маршрут" или добавьте промежуточную точку.');
                }
            }
        });

        function placePoint(type, nodeStr) {
            const pt = coordsDict.get(nodeStr);
            const latlng = [pt[1], pt[0]]; // Leaflet ожидает [lat, lng]

            if (points[type].marker) {
                map.removeLayer(points[type].marker);
            }

            points[type].nodeStr = nodeStr;
            points[type].marker = L.marker(latlng, { icon: createIcon(type) }).addTo(map);
        }

        class MinHeap {
            constructor() { this.heap = []; }
            push(node, weight, path) {
                this.heap.push({node, weight, path});
                this.bubbleUp();
            }
            pop() {
                if(this.heap.length === 1) return this.heap.pop();
                const min = this.heap[0];
                this.heap[0] = this.heap.pop();
                this.sinkDown(0);
                return min;
            }
            bubbleUp() {
                let idx = this.heap.length - 1;
                const element = this.heap[idx];
                while(idx > 0) {
                    let parentIdx = Math.floor((idx - 1) / 2);
                    let parent = this.heap[parentIdx];
                    if(element.weight >= parent.weight) break;
                    this.heap[parentIdx] = element;
                    this.heap[idx] = parent;
                    idx = parentIdx;
                }
            }
            sinkDown(idx) {
                const length = this.heap.length;
                const element = this.heap[idx];
                while(true) {
                    let leftChildIdx = 2 * idx + 1;
                    let rightChildIdx = 2 * idx + 2;
                    let swap = null;
                    if(leftChildIdx < length && this.heap[leftChildIdx].weight < element.weight) swap = leftChildIdx;
                    if(rightChildIdx < length) {
                        let right = this.heap[rightChildIdx].weight;
                        let left = swap === null ? element.weight : this.heap[leftChildIdx].weight;
                        if(right < left) swap = rightChildIdx;
                    }
                    if(swap === null) break;
                    this.heap[idx] = this.heap[swap];
                    this.heap[swap] = element;
                    idx = swap;
                }
            }
            isEmpty() { return this.heap.length === 0; }
        }

        function findShortestPath(startNode, endNode) {
            const pq = new MinHeap();
            const visited = new Set();
            
            pq.push(startNode, 0, []);

            while (!pq.isEmpty()) {
                const {node: currentStr, weight: currentDist, path} = pq.pop();

                if (visited.has(currentStr)) continue;
                visited.add(currentStr);

                const newPath = [...path, currentStr];

                if (currentStr === endNode) {
                    return newPath; // Нашли путь
                }

                const neighbors = graph.get(currentStr);
                if (neighbors) {
                    const p1 = coordsDict.get(currentStr);
                    for (const neighbor of neighbors) {
                        if (!visited.has(neighbor)) {
                            const p2 = coordsDict.get(neighbor);
                            const dist = distance(p1, p2);
                            pq.push(neighbor, currentDist + dist, newPath);
                        }
                    }
                }
            }
            return null; // Путь не найден
        }

        processBtn.addEventListener('click', () => {
            if (!points.start.nodeStr || !points.end.nodeStr) {
                updateStatus('Ошибка: Необходимо установить как минимум Старт и Финиш!', true);
                return;
            }

            updateStatus('Вычисляем маршрут...');
            downloadSection.classList.add('hidden');

            setTimeout(() => {
                let finalPath = [];

                if (points.mid.nodeStr) {
                    // Если есть промежуточная точка, ищем два пути
                    const path1 = findShortestPath(points.start.nodeStr, points.mid.nodeStr);
                    if (!path1) {
                        updateStatus('Ошибка: Невозможно проложить путь от Старта до Промежуточной точки.', true);
                        return;
                    }
                    const path2 = findShortestPath(points.mid.nodeStr, points.end.nodeStr);
                    if (!path2) {
                        updateStatus('Ошибка: Невозможно проложить путь от Промежуточной точки до Финиша.', true);
                        return;
                    }
                    // Объединяем пути, удаляя дублирующуюся точку стыка
                    path1.pop(); 
                    finalPath = [...path1, ...path2];
                } else {
                    // Прямой поиск
                    finalPath = findShortestPath(points.start.nodeStr, points.end.nodeStr);
                    if (!finalPath) {
                        updateStatus('Ошибка: Невозможно проложить непрерывный путь между точками.', true);
                        return;
                    }
                }

                renderResult(finalPath);
            }, 50);
        });

        function renderResult(pathStrs) {
            const outCoordinates = pathStrs.map(str => coordsDict.get(str));

            const outGeoJSON = {
                type: "FeatureCollection",
                features: [{
                    type: "Feature",
                    geometry: {
                        type: "LineString",
                        coordinates: outCoordinates
                    },
                    properties: {
                        name: "Extracted Segment",
                        nodes_count: outCoordinates.length
                    }
                }]
            };

            // Удаляем старый результат
            if (resultGeojsonLayer) map.removeLayer(resultGeojsonLayer);

            // Рисуем новый
            resultGeojsonLayer = L.geoJSON(outGeoJSON, {
                style: {
                    color: '#ef4444', // Ярко-красный
                    weight: 6,
                    opacity: 0.9,
                    lineCap: 'round',
                    lineJoin: 'round'
                }
            }).addTo(map);

            // Создаем Blob для скачивания
            const geoJsonStr = JSON.stringify(outGeoJSON, null, 2);
            const blob = new Blob([geoJsonStr], { type: "application/geo+json" });
            
            if (window.currentDownloadUrl) URL.revokeObjectURL(window.currentDownloadUrl);
            window.currentDownloadUrl = URL.createObjectURL(blob);
            
            downloadLink.setAttribute("href", window.currentDownloadUrl);
            downloadSection.classList.remove('hidden');
            
            updateStatus(`Успех! Маршрут из ${outCoordinates.length} точек построен.`);
        }
    </script>
</body>
</html>
